<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#c06830"/>
  <!-- Subtle inner glow -->
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="#d88050" stroke-width="2" opacity="0.3"/>
  <!-- Open book shape -->
  <g transform="translate(256, 280)">
    <!-- Left page -->
    <path d="M-20 -120 C-20 -120 -150 -145 -150 -110 L-150 100 C-150 115 -20 100 -20 100 Z" fill="#faf6f1" opacity="0.95"/>
    <!-- Right page -->
    <path d="M20 -120 C20 -120 150 -145 150 -110 L150 100 C150 115 20 100 20 100 Z" fill="#faf6f1" opacity="0.85"/>
    <!-- Spine -->
    <path d="M-20 -120 L0 -135 L20 -120 L20 100 L0 108 L-20 100 Z" fill="#f0e9df"/>
    <!-- Text lines on left page -->
    <line x1="-125" y1="-65" x2="-45" y2="-65" stroke="#c06830" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
    <line x1="-125" y1="-35" x2="-55" y2="-35" stroke="#c06830" stroke-width="8" stroke-linecap="round" opacity="0.28"/>
    <line x1="-125" y1="-5" x2="-50" y2="-5" stroke="#c06830" stroke-width="8" stroke-linecap="round" opacity="0.22"/>
    <line x1="-125" y1="25" x2="-65" y2="25" stroke="#c06830" stroke-width="8" stroke-linecap="round" opacity="0.18"/>
    <line x1="-125" y1="55" x2="-55" y2="55" stroke="#c06830" stroke-width="8" stroke-linecap="round" opacity="0.15"/>
    <!-- Text lines on right page -->
    <line x1="45" y1="-65" x2="125" y2="-65" stroke="#c06830" stroke-width="8" stroke-linecap="round" opacity="0.25"/>
    <line x1="45" y1="-35" x2="115" y2="-35" stroke="#c06830" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
    <line x1="45" y1="-5" x2="120" y2="-5" stroke="#c06830" stroke-width="8" stroke-linecap="round" opacity="0.16"/>
    <line x1="45" y1="25" x2="105" y2="25" stroke="#c06830" stroke-width="8" stroke-linecap="round" opacity="0.13"/>
  </g>
</svg>
