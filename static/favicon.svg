<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Warm parchment circle background -->
  <circle cx="16" cy="16" r="15" fill="#c06830"/>
  <!-- Open book shape -->
  <g transform="translate(16, 17)">
    <!-- Left page -->
    <path d="M-1.5 -7 C-1.5 -7 -9 -8.5 -9 -6.5 L-9 6 C-9 7 -1.5 6 -1.5 6 Z" fill="#faf6f1" opacity="0.95"/>
    <!-- Right page -->
    <path d="M1.5 -7 C1.5 -7 9 -8.5 9 -6.5 L9 6 C9 7 1.5 6 1.5 6 Z" fill="#faf6f1" opacity="0.85"/>
    <!-- Spine -->
    <path d="M-1.5 -7 L0 -8 L1.5 -7 L1.5 6 L0 6.5 L-1.5 6 Z" fill="#f0e9df"/>
    <!-- Text lines on left page -->
    <line x1="-7.5" y1="-4" x2="-3" y2="-4" stroke="#c06830" stroke-width="0.7" stroke-linecap="round" opacity="0.4"/>
    <line x1="-7.5" y1="-2" x2="-4" y2="-2" stroke="#c06830" stroke-width="0.7" stroke-linecap="round" opacity="0.3"/>
    <line x1="-7.5" y1="0" x2="-3.5" y2="0" stroke="#c06830" stroke-width="0.7" stroke-linecap="round" opacity="0.25"/>
    <line x1="-7.5" y1="2" x2="-4.5" y2="2" stroke="#c06830" stroke-width="0.7" stroke-linecap="round" opacity="0.2"/>
  </g>
</svg>
